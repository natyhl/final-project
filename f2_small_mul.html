<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Multiples</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    <style>
        /* CSS styles for the chart */
        .line {
            fill: none;
            stroke-width: 2;
        }
        circle:hover {
            fill: orange;
        }
        .axis-x path,
        .axis-y path {
            fill: none;
            stroke: black;
            shape-rendering: crispEdges;
        }

        .axis-x .tick line,
        .axis-y .tick line {
            stroke: #ccc;
        }

        .axis text {
            font-size: 8px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>
    <!-- Create a div where the graph will take place, Source: https://d3-graph-gallery.com/graph/line_smallmultiple.html-->
    <div id="my_dataviz"></div> 

    <script>
        // Set up the SVG container
        var margin = {top: 60, right: 0, bottom: 30, left: 50},
        width = 210 - margin.left - margin.right,
        height = 210 - margin.top - margin.bottom;

        const stages = ["Land use change","Animal Feed","Farm","Processing","Transport","Packging","Retail"];

        // Color scale
        const colors = ["#66c2a5","#fc8d62","#8da0cb","#e78ac3","#a6d854","#ffd92f","#e5c494"];

        const colorScale = d3.scaleOrdinal()
            .domain(stages)
            .range(colors);

        // Source daytaset: https://observablehq.com/@nikomccarty/multiline-chart-d3
        d3.csv("Food_Production.csv").then(function(rawData) {

            // Convert string values to numbers
            const allData = [];
            const top15 = rawData.sort((a,b) => +b["Total_emissions"] - +a["Total_emissions"]).slice(0,15);
            top15.forEach(function(d) {
                stages.forEach(function(s) {
                    allData.push({
                        name: d["Food product"],
                        stage: s,
                        value: +d[s]
                    });
                });
            });

            // group the data: I want to draw one line per group, Source: https://d3-graph-gallery.com/graph/line_smallmultiple.html 
            // var sumstat = d3.nest() // nest function allows to group the calculation per level of a factor
            //     .key(function(d) { return d.name;})
            //     .entries(data);
            var sumstat = Array.from(d3.group(allData, d => d.name), ([key, values]) => ({ key, values }));

            // What is the list of groups?
            allKeys = sumstat.map(function(d){return d.key})

            // Define X and Y scales
            const scaleX = d3.scaleBand()
               .domain(["Land use change","Animal Feed","Farm","Processing","Transport","Packging","Retail"]) // Source: https://d3-graph-gallery.com/graph/line_smallmultiple.html
               .range([0, width])
               .padding(0.1);

            const scaleY = d3.scaleLinear()
                .domain([0, d3.max(allData, d => d.value)])
                .nice()
                .range([height, 0]);

            // Add an svg element for each group, source: https://d3-graph-gallery.com/graph/line_smallmultiple.html
            var svg = d3.select("#my_dataviz")
            .selectAll("uniqueChart")
            .data(sumstat)
            .enter()
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .style("overflow", "visible") // Fix title visibility issue, Claude
            .append("g")
            .attr("transform",
                    "translate(" + margin.left + "," + margin.top + ")"); 

            // Draw bars
            svg.each(function(foodRow) {
                d3.select(this).selectAll("rect")
                    .data(foodRow.values)
                    .enter()
                    .append("rect")
                    .attr("x",      d => scaleX(d.stage))
                    .attr("y",      d => scaleY(d.value))
                    .attr("width",  scaleX.bandwidth())
                    .attr("height", d => height - scaleY(d.value))
                    .attr("fill",   d => colorScale(d.stage));
            });

            // Add X and Y axes
            svg.append("g")
                .attr("class", "axis axis-x")
                .attr("transform", `translate(0, ${height})`)
                .call(d3.axisBottom(scaleX).tickFormat(() => ""));

            svg.append("g")
                .attr("class", "axis axis-y")
                .call(d3.axisLeft(scaleY).ticks(5));

            // Add title, https://d3-graph-gallery.com/graph/line_smallmultiple.html
            svg.append("text")
                .attr("text-anchor", "start")
                .attr("y", -(margin.top - 15))
                .attr("x", 0)
                .text(function(d){ return(d.key)})
                .style("fill", function(d){ return "#2c4a3e" })

            // X-axis label
            //Source: https://stackoverflow.com/questions/11189284/d3-axis-labeling
            svg.append("text")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", height + margin.bottom - 2)
                .attr("font-size", "8px")
                .text("Stage");

            // Y-axis label
            svg.append("text")
                .attr("text-anchor", "middle")
                .attr("x", -height / 2)
                .attr("y", -50)
                .attr("dy", ".75em")
                .attr("font-size", "8px")
                .attr("transform", "rotate(-90)")
                .text("kg CO2eq / kg");

            // Add legend, source: https://d3-legend.susielu.com/
            const legendSvg = d3.select("#my_dataviz")
                   .append("svg")
                   .attr("width", 160)            
                   .attr("height", 180);

            legendSvg.append("g")
                   .attr("class", "legendOrdinal")
                   .attr("transform", `translate(10,20)`);

                var legendOrdinal = d3.legendColor()
                    .shapeWidth(30)
                    .orient("vertical")
                    .scale(colorScale) 
                    .title("Stage");

                legendSvg.select(".legendOrdinal")
                  .call(legendOrdinal);
        });
    </script>
</body>
</html>
