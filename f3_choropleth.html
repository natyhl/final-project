<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choropleth Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script> <!-- Source: https://github.com/topojson/topojson -->
    <style>
        /* CSS styles for the chart */
        .bar {
            fill: #64c8c8;
        }
        .bar:hover {
            fill: orange;
        }
        .axis-x path,
        .axis-y path {
            fill: none;
            stroke: black;
            shape-rendering: crispEdges;
        }

        .axis-x .tick line,
        .axis-y .tick line {
            stroke: #ccc;
        }

        .axis text {
            font-size: 12px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
        .bar-label {
            font-size: 10px;
        }
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

    </style>
</head>
<body style="margin:0; overflow:hidden;"> <!--AI fix to fit index.html-->
    <div id="chart-container"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        // Aiming for grade A
        // Set up the SVG container
        const svgWidth = 1200;
        const svgHeight = 650;
        const margin = { top: 60, right: 200, bottom: 80, left: 100 };
        
        const width = svgWidth - margin.left - margin.right;
        const height = svgHeight - margin.top - margin.bottom;

        const svg = d3.select("#chart-container")
            .append("svg")
            .attr("width", svgWidth)
            .attr("height", svgHeight)
            .attr("viewBox", [0, 0, svgWidth, svgHeight]) // Source: https://observablehq.com/@d3/world-choropleth/2
            .attr("style", "max-width: 100%; height: auto;");

        const tooltip = d3.select("#tooltip");
        const format = (d) => d3.format(".2s")(d).replace("G", "B");

        d3.csv("CO2emission_by_countries_2000.csv").then(function(data) { // data source (edited): https://www.kaggle.com/datasets/moazzimalibhatti/co2-emission-by-countries-year-wise-17502022

            // Convert string values to numbers
            data.forEach(function(d) {
                d.co2 = +d.co2;
            });

            d3.json("countries-50m.json").then(function(world) { //https://observablehq.com/@d3/world-choropleth/2

            // Source: https://observablehq.com/@d3/world-choropleth/2
            // Index the values and create the color scale.
            const valuemap = new Map(data.map(d => [d.country, d.co2]));

            // Some names need to be matched
            const nameMap = {
                "United States of America": "United States",
                "Bosnia and Herz.": "Bosnia and Herzegovina",
                "Central African Rep.": "Central African Republic",
                "Côte d\'Ivoire": "Cote d\'Ivoire",
                "Dem. Rep. Congo": "Democratic Republic of Congo",
                "Eq. Guinea": "Equatorial Guinea",
                "Faeroe Is.": "Faeroe Islands",
                "Fr. Polynesia": "French Polynesia",
                "Macedonia": "North Macedonia",
                "Marshall Is.": "Marshall Islands",
                "S. Sudan": "South Sudan",
                "Solomon Is.": "Solomon Islands",
                "St. Kitts and Nevis": "Saint Kitts and Nevis",
                "St. Pierre and Miquelon": "Saint Pierre and Miquelon",
                "São Tomé and Principe": "Sao Tome and Principe",
                "Turks and Caicos Is.": "Turks and Caicos Islands",
                "Wallis and Futuna Is.": "Wallis and Futuna",
                "Cook Is.": "Cook Islands",
                "Cabo Verde": "Cape Verde",
                "Antigua and Barb.": "Antigua and Barbuda",
                "eSwatini": "Eswatini",
                "Timor-Leste": "Timor"
            };

            function getValue(name) {
                return valuemap.get(name) || valuemap.get(nameMap[name]);
            }

            const scaleColor = d3.scaleSequentialLog(d3.interpolateYlGnBu)
                .domain([1, d3.max(data, d => d.co2)])
                .unknown("#ccc"); // source: https://d3js.org/d3-scale/linear

           // Fit the projection. Source: https://observablehq.com/@d3/world-choropleth/2
          const projection = d3.geoEqualEarth().fitExtent([[2, margin.top + 2], [width - 2, height]], {type: "Sphere"});
          const path = d3.geoPath(projection);

          // Source: https://observablehq.com/@d3/world-choropleth/2
          countries = topojson.feature(world, world.objects.countries);
          countrymesh = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

          // Add a white sphere with a black border. Source: https://observablehq.com/@d3/world-choropleth/2
        svg.append("path")
            .datum({type: "Sphere"})
            .attr("fill", "white")
            .attr("stroke", "currentColor")
            .attr("d", path);


        svg.append("g")
            .selectAll("path")
            .data(countries.features)
            .join("path")
            .attr("fill", d => scaleColor(getValue(d.properties.name)))
            .attr("d", path)
            
            .on("mouseover", (event, d) => {
                tooltip
                    .html(`${d.properties.name}: ${getValue(d.properties.name) ? format(getValue(d.properties.name)) + " tons" : "N/A"}`)
                    .style("opacity", 1);
                })
            .on("mousemove", (event) => {
                    tooltip
                        .style("left", (event.pageX + 12) + "px")
                        .style("top",  (event.pageY - 28) + "px");
                })
            .on("mouseleave", () => {
                    tooltip.style("opacity", 0);
                })
            .append("title")
            .text(d => `${d.properties.name}\n${getValue(d.properties.name) ? format(getValue(d.properties.name)) + " tons" : "N/A"}`)

            // Add a white mesh. Source: https://observablehq.com/@d3/world-choropleth/2
            svg.append("path")
                .datum(countrymesh)
                .attr("fill", "none")
                .attr("stroke", "white")
                .attr("d", path);


            // Add title, http://www.d3noob.org/2013/01/adding-title-to-your-d3js-graph.html
            svg.append("text")
                .attr("x", svgWidth / 2)
                .attr("y", 30) 
                .attr("text-anchor", "middle") 
                .text("World CO₂ Emissions 2000 - Choropleth Map");

            svg.append("g")
              .attr("class", "legendColor")
              .attr("transform", `translate(${width + margin.left + 20}, 320)`);

            var legend = d3.legendColor()
              .scale(scaleColor)
              .cells([1e6, 1e7, 1e8, 1e9, 1e10, 1e11, 3e11]) // manually split
              .labelFormat(d3.format(".2s"))
              .labels(["below 1M", "10M", "100M", "1B", "10B", "100B", "300B"])
              .title("CO₂ Emissions (in tons)");

            svg.select(".legendColor")
              .call(legend);
            });

        });
    </script>
</body>
</html>
